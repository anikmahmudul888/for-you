<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Favorite Person ❤️</title>
    <style>
        :root {
            --dark-pink: #880e4f;
            --hot-pink: #c2185b;
            --soft-pink: #fce4ec;
            --accent-gold: #ffd700;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-pink);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--soft-pink);
        }

        /* Floating Hearts Background */
        .bg-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            background: rgba(136, 14, 79, 0.6);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            border: 2px solid var(--hot-pink);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 2rem;
        }

        .comp-btn {
            background: var(--hot-pink);
            color: white;
            border: 2px solid var(--soft-pink);
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .comp-btn:hover {
            background: var(--soft-pink);
            color: var(--dark-pink);
            transform: scale(1.1);
        }

        .comp-btn.active {
            background: var(--accent-gold);
            color: var(--dark-pink);
            border-color: var(--accent-gold);
        }

        #display-area {
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            font-size: 1.3rem;
            font-style: italic;
            line-height: 1.4;
            border-left: 5px solid var(--accent-gold);
            transition: opacity 0.3s ease;
        }

        .footer-note {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .heart-shape {
            position: absolute;
            color: rgba(255, 182, 193, 0.3);
            animation: float linear infinite;
        }
    </style>
</head>
<body>

    <div class="bg-hearts" id="heartContainer"></div>

    <div class="container">
        <h1>For You POMET 👑</h1>
        <p>Click the letters to see a message...</p>
        
        <div class="button-grid">
            <button class="comp-btn" onclick="showMsg(this, 'You are absolutely, incredibly pretty. Every single day. 😍')">A</button>
            <button class="comp-btn" onclick="showMsg(this, 'You look so exceptionally cute with little cloths🤭💕')">B</button>
            <button class="comp-btn" onclick="showMsg(this, 'Your skin is as smooth and soft as butter. ✨')">C</button>
            <button class="comp-btn" onclick="showMsg(this, 'Your smile rivals the prettiest roses. 🌟')">D</button>
            <button class="comp-btn" onclick="showMsg(this, 'You make every day feel magical. 💖')">E</button>
            <button class="comp-btn" onclick="showMsg(this, 'Hope you like it, TOMATO ❤️')">?</button>
        </div>

        <div id="display-area">
            Tap a button above...
        </div>

        <div class="footer-note">Made with love</div>
    </div>

    <script>
        function showMsg(btn, msg) {
            // Remove active class from all buttons
            document.querySelectorAll('.comp-btn').forEach(b => b.classList.remove('active'));
            
            // Add active class to clicked button
            btn.classList.add('active');
            
            // Update text with a small fade effect
            const display = document.getElementById('display-area');
            display.style.opacity = 0;
            setTimeout(() => {
                display.innerText = msg;
                display.style.opacity = 1;
            }, 200);
        }

        // Generate Background Hearts
        function createHearts() {
            const container = document.getElementById('heartContainer');
            const heartIcons = ['❤️', '💖', '✨', '🌸'];
            
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-shape';
                heart.innerText = heartIcons[Math.floor(Math.random() * heartIcons.length)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
                heart.style.animationDelay = (Math.random() * 5) + 's';
                container.appendChild(heart);
            }
        }

        createHearts();
    </script>
</body>
</html>
